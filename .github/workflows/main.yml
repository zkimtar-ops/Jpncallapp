name: SOS Japan Final Pro
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign
        run: |
          # 1. تثبيت كوردوفا
          npm install cordova
          
          # 2. إضافة المنصة
          npx cordova platform add android@13.0.0
          
          # 3. إضافة الإضافات (حل مشكلة 404 عبر استخدام الروابط المباشرة)
          npx cordova plugin add cordova-sqlite-storage
          npx cordova plugin add cordova-plugin-android-permissions
          npx cordova plugin add https://github.com/katzer/cordova-plugin-local-notification.git
          npx cordova plugin add https://github.com/napolitano/cordova-plugin-intent.git
          npx cordova plugin add https://github.com/renanoliveira/cordova-phone-call-trap.git
          
          # 4. إصلاح أخطاء Gradle 8.7 (تحويل compile إلى implementation)
          find platforms/android/ -name "*.gradle" -exec sed -i 's/compile /implementation /g' {} +
          find platforms/android/ -name "*.gradle" -exec sed -i 's/compile(/implementation(/g' {} +
          
          # 5. حقن ملف الجافا (CallScreeningService)
          mkdir -p platforms/android/app/src/main/java/com/nospam/japan/
          cp CallScreeningService.java platforms/android/app/src/main/java/com/nospam/japan/
          
          # 6. قبول التراخيص وبناء المفتاح (إذا لم يكن موجوداً)
          yes | sdkmanager --licenses || true
          if [ ! -f release.jks ]; then
            keytool -genkey -v -keystore release.jks -alias zakaria_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          fi
          
          # 7. إعداد ملف التوقيع
          cat <<EOF > build.json
          {
            "android": {
              "release": {
                "keystore": "release.jks",
                "storePassword": "123456",
                "alias": "zakaria_key",
                "password": "123456",
                "keystoreType": "pkcs12"
              }
            }
          }
          EOF

          # 8. البناء النهائي مع تحديد الهدف أندرويد 14
          npx cordova build android --release --device --buildConfig=build.json -- --project.properties.target=android-34 --packageType=apk
          
          cp platforms/android/app/build/outputs/apk/release/app-release.apk ./SOS_Japan_Final_Pro.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SOS-Japan-Final-Pro
          path: |
            SOS_Japan_Final_Pro.apk
            release.jks
