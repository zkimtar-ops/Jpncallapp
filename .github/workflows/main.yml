name: Safety_Call_Japan_Full_Package
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android App
        run: |
          # التثبيت العالمي كما كنت تفعل سابقاً
          npm install -g cordova --no-audit
          
          # تنظيف البيئة
          rm -rf node_modules package-lock.json platforms plugins
          
          # إضافة المنصة والاضافات
          cordova platform add android@13.0.0 --save
          cordova plugin add cordova-plugin-android-permissions --save
          cordova plugin add cordova-plugin-device --save
          cordova plugin add cordova-sqlite-storage --save
          cordova plugin add cordova-plugin-local-notification-12 --save
          cordova plugin add com-darryncampbell-cordova-plugin-intent --save

          # --- إصلاحات إجبارية لضمان نجاح البناء (بدون npx) ---
          # حل مشكلة compileSdkVersion التي تسببت في فشل عملك
          echo "cdvCompileSdkVersion=34" >> platforms/android/gradle.properties
          echo "cdvTargetSdkVersion=34" >> platforms/android/gradle.properties
          
          # تصحيح المكتبات القديمة لتتوافق مع Gradle 8.7
          find platforms/android/cordova-plugin-* -name "*.gradle" -exec sed -i 's/compile /implementation /g' {} +

          # حقن ملف الجافا في المسار الصحيح لضمان عمل الحظر
          mkdir -p platforms/android/app/src/main/java/com/nospam/japan/
          cp CallScreeningService.java platforms/android/app/src/main/java/com/nospam/japan/
          
          # إنشاء مفتاح التوقيع
          keytool -genkey -v -keystore release.jks -alias safety_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12

          cat <<EOF > build.json
          {"android": {"release": {"keystore": "release.jks", "storePassword": "123456", "alias": "safety_key", "password": "123456", "keystoreType": "pkcs12"}}}
          EOF

          # البناء النهائي
          cordova build android --release --buildConfig=build.json -- --packageType=apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeCall-Japan-Final
          path: platforms/android/app/build/outputs/apk/release/*.apk
