name: SOS Japan Final Pro
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign
        run: |
          # 1. تثبيت كوردوفا محلياً لتجنب مشاكل الـ PATH
          npm install cordova
          
          # 2. إضافة المنصة (بدون عمل create لأن ملفاتك موجودة)
          npx cordova platform add android@13.0.0
          
          # 3. إضافة الإضافات (تمت إضافة SQLite وتنظيف القائمة)
          npx cordova plugin add cordova-sqlite-storage
          npx cordova plugin add cordova-plugin-intent
          npx cordova plugin add cordova-plugin-android-permissions
          npx cordova plugin add cordova-plugin-local-notification
          npx cordova plugin add https://github.com/renanoliveira/cordova-phone-call-trap.git
          
          # 4. نقل ملف الجافا لمكانه الصحيح (خطوة حاسمة)
          # تأكد أن ملف CallScreeningService.java موجود في جذر المستودع
          mkdir -p platforms/android/app/src/main/java/com/nospam/japan/
          cp CallScreeningService.java platforms/android/app/src/main/java/com/nospam/japan/
          
          # 5. قبول التراخيص وإنشاء مفتاح التوقيع
          yes | sdkmanager --licenses || true
          keytool -genkey -v -keystore release.jks -alias zakaria_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          # 6. إعداد ملف بناء التوقيع
          cat <<EOF > build.json
          {
            "android": {
              "release": {
                "keystore": "release.jks",
                "storePassword": "123456",
                "alias": "zakaria_key",
                "password": "123456",
                "keystoreType": "pkcs12"
              }
            }
          }
          EOF

          # 7. بناء التطبيق بصيغة APK
          npx cordova build android --release --device --buildConfig=build.json -- --packageType=apk
          
          # نسخ الملف الناتج للاستخراج
          cp platforms/android/app/build/outputs/apk/release/app-release.apk ./SOS_Japan_Final_Pro.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SOS-Japan-Final-Pro
          path: |
            SOS_Japan_Final_Pro.apk
            release.jks
