name: SOS Japan Final Pro
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign Everything
        run: |
          npm install -g cordova
          
          # 1. إضافة المنصة أندرويد 13 لضمان التوافق مع SDK 34
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 2. إضافة الإضافات بأسماء صحيحة وموجودة في السجل الرسمي
          cordova plugin add cordova-sqlite-storage
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-dialogs
          cordova plugin add cordova-plugin-vibration
          cordova plugin add cordova-plugin-local-notification
          cordova plugin add com-darryncampbell-cordova-plugin-intent
          cordova plugin add https://github.com/renanoliveira/cordova-phone-call-trap.git
          
          # 3. إصلاح تعارضات Gradle 8.7 (تغيير compile إلى implementation)
          find platforms/android/ -name "*.gradle" -exec sed -i 's/compile /implementation /g' {} +
          find platforms/android/ -name "*.gradle" -exec sed -i 's/compile(/implementation(/g' {} +

          # 4. حقن ملف الجافا (محرك الحظر) بالاسم المعتمد في config.xml
          mkdir -p platforms/android/app/src/main/java/com/nospam/japan/
          cp CallScreeningService.java platforms/android/app/src/main/java/com/nospam/japan/MyCallScreeningService.java
          
          # 5. حل مشكلة compileSdkVersion برمجياً
          echo "cdvCompileSdkVersion=34" >> platforms/android/gradle.properties
          echo "cdvTargetSdkVersion=34" >> platforms/android/gradle.properties

          # 6. إنشاء مفتاح التوقيع
          keytool -genkey -v -keystore release.jks -alias zakaria_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          # 7. إعداد ملف التوقيع
          cat <<EOF > build.json
          {
            "android": {
              "release": {
                "keystore": "release.jks",
                "storePassword": "123456",
                "alias": "zakaria_key",
                "password": "123456",
                "keystoreType": "pkcs12"
              }
            }
          }
          EOF

          # 8. البناء النهائي
          cordova build android --release --device --buildConfig=build.json -- --packageType=apk
          
          find platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} ./SOS_Japan_Final_Pro.apk \;

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SOS-Japan-Final-Pro
          path: |
            *.apk
            release.jks
