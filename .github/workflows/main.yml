name: SOS Japan Final Pro
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign Everything
        run: |
          npm install -g cordova
          
          # 1. تنظيف شامل لبدء بناء نظيف
          rm -rf platforms plugins package.json package-lock.json
          npm init -y
          
          # 2. إضافة المنصة
          yes | sdkmanager --licenses || true
          cordova platform add android@13.0.0
          
          # 3. إضافة الإضافات (بدون تحديد نسخ لتجنب أخطاء السجل)
          cordova plugin add cordova-sqlite-storage
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-device
          cordova plugin add cordova-plugin-local-notification
          cordova plugin add com-darryncampbell-cordova-plugin-intent
          cordova plugin add https://github.com/renanoliveira/cordova-phone-call-trap.git
          
          # 4. إصلاح Gradle 8.7 بطريقة ذكية (نصلح فقط داخل المجلدات المتضررة وليس النظام)
          # هذا الأمر لن يلمس ملفات CordovaLib التي سببت الخطأ الأخير
          find plugins/ -name "*.gradle" -exec sed -i 's/compile /implementation /g' {} +
          find plugins/ -name "*.gradle" -exec sed -i 's/compile(/implementation(/g' {} +

          # 5. حقن الإصدار 34 يدوياً في ملف الخصائص (لحل مشكلة compileSdkVersion)
          echo "cdvCompileSdkVersion=34" >> platforms/android/gradle.properties
          echo "cdvTargetSdkVersion=34" >> platforms/android/gradle.properties
          
          # 6. حقن ملف الجافا (محرك الحظر)
          mkdir -p platforms/android/app/src/main/java/com/nospam/japan/
          cp CallScreeningService.java platforms/android/app/src/main/java/com/nospam/japan/MyCallScreeningService.java
          
          # 7. إنشاء التوقيع
          keytool -genkey -v -keystore release.jks -alias zakaria_key -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=Zakaria" -deststoretype pkcs12
          
          cat <<EOF > build.json
          {
            "android": {
              "release": {
                "keystore": "release.jks",
                "storePassword": "123456",
                "alias": "zakaria_key",
                "password": "123456",
                "keystoreType": "pkcs12"
              }
            }
          }
          EOF

          # 8. البناء النهائي - أضفنا باراميتر الـ SDK هنا أيضاً للتأكيد
          cordova build android --release --device --buildConfig=build.json -- --project.properties.target=android-34 --packageType=apk
          
          cp platforms/android/app/build/outputs/apk/release/*.apk ./SOS_Japan_Final_Pro.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SOS-Japan-Final-Pro
          path: SOS_Japan_Final_Pro.apk
