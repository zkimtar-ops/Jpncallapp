<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>SOS Japan Pro</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .hidden { display: none; }
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .notif-card { background: #f0f0f0; padding: 10px; margin: 5px; border-radius: 5px; color: #333; }
        #loading-message { color: #ffcc00; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>حماية المكالمات - اليابان</h1>
        
        <div id="loading-message">جاري جلب البيانات...</div>

        <div id="list-content"></div>

        <div id="welcome-overlay" class="hidden">
            <h2>مرحباً بك في SOS Japan</h2>
            <p>هذا التطبيق يحميك من المكالمات المزعجة تلقائياً.</p>
            <button onclick="closeWelcome()">ابدأ الآن</button>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
