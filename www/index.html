<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>SOS Japan Pro</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 20px; text-align: center; }
        .hidden { display: none !important; }
        
        /* تصميم السلايدر (Welcome Overlay) */
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        
        button#start-btn {
            background: #ff4444; color: white; border: none;
            padding: 15px 40px; font-size: 1.2rem; border-radius: 30px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #loading-message { color: #ffcc00; margin-top: 20px; font-weight: bold; }
        .notif-card { background: #1e1e1e; padding: 15px; margin: 10px 0; border-radius: 10px; border-right: 5px solid #ff4444; text-align: right; }
    </style>
</head>
<body>

    <div id="app">
        <h1>SOS Japan Pro 🇯🇵</h1>
        
        <div id="loading-message">جاري جلب البيانات المحلية...</div>
        <div id="list-content"></div>

        <div id="welcome-overlay" class="hidden">
            <h2>مرحباً بك يا زكريا</h2>
            <p>هذا التطبيق يقوم بحظر المكالمات المزعجة في اليابان تلقائياً، حتى بدون إنترنت.</p>
            <br>
            <button id="start-btn">ابدأ الآن</button>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
